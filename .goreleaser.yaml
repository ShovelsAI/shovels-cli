version: 2

project_name: shovels

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - main: .
    binary: shovels
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "shovels_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: shovels-ai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/shovels-ai/shovels-cli"
    description: "Agent-first CLI for the Shovels building permit and contractor API"
    license: "MIT"
    install: |
      bin.install "shovels"
    test: |
      system "#{bin}/shovels", "version"

release:
  github:
    owner: shovels-ai
    name: shovels-cli
  draft: false
  prerelease: auto
