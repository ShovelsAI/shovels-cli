# Hand-enriched field descriptions, units, and ranges for schema generation.
# Overrides take precedence over OpenAPI descriptions on conflict.
# Fields listed here that do not exist in the OpenAPI spec are ignored.

permits search:
  fields:
    id:
      description: "Unique permit identifier assigned by Shovels"
    number:
      description: "Permit number from the issuing jurisdiction"
    description:
      description: "Work description from the permit application"
    jurisdiction:
      description: "Name of the jurisdiction that issued the permit"
    type:
      description: "Permit type classification (e.g., building, electrical, plumbing)"
    status:
      description: "Current permit status"
      enum: "active, final, in_review, inactive"
    file_date:
      description: "Date the permit application was filed"
    issue_date:
      description: "Date the permit was approved and issued"
    final_date:
      description: "Date the permit received final inspection approval"
    start_date:
      description: "Earliest date associated with the permit"
    end_date:
      description: "Latest date associated with the permit"
    job_value:
      description: "Total project value declared on the permit, in cents (divide by 100 for dollars)"
      unit: "cents"
    fees:
      description: "Permit fees charged by the jurisdiction, in cents (divide by 100 for dollars)"
      unit: "cents"
    approval_duration:
      description: "Days from filing to permit issuance"
      unit: "days"
    construction_duration:
      description: "Days from issuance to final inspection"
      unit: "days"
    total_duration:
      description: "Days from filing to final inspection"
      unit: "days"
    inspection_pass_rate:
      description: "Percentage of inspections passed on first attempt"
      range: "0-100"
      unit: "percent"
    contractor_id:
      description: "ID of the contractor associated with this permit, null if unlinked"
    tags:
      description: "Permit classification tags (e.g., solar, roofing, electrical)"

