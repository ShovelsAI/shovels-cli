contractors search:
  fields:
    id:
      description: "Unique contractor identifier assigned by Shovels"
    name:
      description: "Contractor name from license records"
    business_name:
      description: "Registered business name"
    business_type:
      description: "Business entity type (e.g., corporation, LLC, sole proprietorship)"
    classification:
      description: "Primary license classification"
    classification_derived:
      description: "Shovels-derived contractor classifications based on permit history"
    license:
      description: "Contractor license number"
    license_issue_date:
      description: "Date the license was issued"
    license_exp_date:
      description: "Date the license expires"
    phone:
      description: "Contractor phone number"
    email:
      description: "Contractor email address"
    website:
      description: "Contractor website URL"
    permit_count:
      description: "GLOBAL (lifetime, NOT filtered by search parameters): Total number of permits ever associated with this contractor"
    avg_job_value:
      description: "GLOBAL (lifetime, NOT filtered by search parameters): Average job value across all permits, in cents (divide by 100 for dollars)"
      unit: "cents"
    total_job_value:
      description: "GLOBAL (lifetime, NOT filtered by search parameters): Sum of job values across all permits, in cents (divide by 100 for dollars)"
      unit: "cents"
    avg_construction_duration:
      description: "GLOBAL (lifetime, NOT filtered by search parameters): Average days from permit issuance to final inspection"
      unit: "days"
    avg_inspection_pass_rate:
      description: "GLOBAL (lifetime, NOT filtered by search parameters): Average percentage of inspections passed on first attempt"
      range: "0-100"
      unit: "percent"
    tag_tally:
      description: "FILTERED (by --geo-id, --permit-from, --permit-to, and --tags): Count of permits per tag within the search area and date range. Sum may exceed permit_count because a single permit can have multiple tags"
    status_tally:
      description: "FILTERED (by --geo-id, --permit-from, --permit-to, and --tags): Count of permits per status within the search area and date range. Available keys: active, final, unknown, inactive, in_review"
    rating:
      description: "Contractor rating score"
    review_count:
      description: "Number of reviews received"

